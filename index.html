        setScenarios(prev => prev.map(s => {
          if (s.id === id) {
            return { ...s, selected: s.selected === optionIdx ? 'pending' : optionIdx };
          }
          return s;
        }));
      };

      const handleLikeComment = (id) => {
        setComments(prev => prev.map(c => c.id === id ? { ...c, likes: c.likes + 1 } : c));
      };

      const handleAddComment = (e) => {
        e.preventDefault();
        if (!commentInput.trim()) return;
        const nickname = nicknameInput.trim() || '익명의축구팬';
        const newComment = {
          id: Date.now(),
          nickname,
          text: commentInput,
          likes: 0,
          time: '방금 전'
        };
        setComments([newComment, ...comments]);
        setCommentInput('');
        setNicknameInput('');
      };

      const applyPreset = (type) => {
        if (type === 'best') {
          setScenarios(prev => prev.map(s => {
            const successIdx = s.options.findIndex(opt => opt.effect === 'success');
            return { ...s, selected: successIdx !== -1 ? successIdx : 'pending' };
          }));
          setSelectedTimeIdx(5);
        } else if (type === 'worst') {
          setScenarios(prev => prev.map(s => {
            const failIdx = s.options.findIndex(opt => opt.effect === 'fail');
            return { ...s, selected: failIdx !== -1 ? failIdx : 'pending' };
          }));
          setSelectedTimeIdx(5);
        } else if (type === 'cutoff') {
          setScenarios(prev => prev.map(s => {
            const targetEffect = [1, 2, 5].includes(s.id) ? 'success' : 'fail';
            const idx = s.options.findIndex(opt => opt.effect === targetEffect);
            return { ...s, selected: idx !== -1 ? idx : 'pending' };
          }));
          setSelectedTimeIdx(5);
        } else {
          setScenarios(prev => prev.map(s => ({ ...s, selected: 'pending' })));
          setSelectedTimeIdx(0);

        if (scenario.selected === 'pending') return 'pending';
        return scenario.options[scenario.selected].effect;

          teamH = { ...teamH, name: '우루과이 🇺🇾 (H조 3위)', pts: 2, gd: -2, desc: '스페인 승리로 우루과이 차단' };
        } else if (statusH === 'fail') {
          teamH = { ...teamH, name: '우루과이 🇺🇾 (H조 3위)', pts: 4, gd: 0, desc: '우루과이 승점 획득에 성공' };
        } else {
          teamH = { ...teamH, name: 'H조 3위 (대기중)', pts: 3, gd: 0, desc: '경기 전 대기 상태' };
        }

        // I조 가상 계산
        let teamI = { id: 'I', name: 'I조 3위 (이라크/세네갈)', group: 'I', pts: 3, gd: 0, fixed: false };
        if (statusI === 'success') {
          teamI = { ...teamI, name: '세네갈 🇸🇳 (I조 3위)', pts: 3, gd: -2, desc: '최소 격차 승리로 한국 득실 우세' };
        } else if (statusI === 'fail') {
          teamI = { ...teamI, name: '이라크 🇮🇶 (I조 3위)', pts: 4, gd: 1, desc: '한국에 불리한 무승부/대승 발생' };
        } else {
          teamI = { ...teamI, name: 'I조 3위 (대기중)', pts: 3, gd: 0, desc: '경기 전 대기 상태' };
        }

        // J조 가상 계산
        let teamJ = { id: 'J', name: 'J조 3위 (오스트리아/알제리)', group: 'J', pts: 3, gd: 0, fixed: false };
        if (statusJ === 'success') {
          teamJ = { ...teamJ, name: '알제리 🇩🇿 (J조 3위)', pts: 3, gd: -2, desc: '알제리 패배 혹은 오스트리아 대승' };
        } else if (statusJ === 'fail') {
          teamJ = { ...teamJ, name: '오스트리아 🇦🇹 (J조 3위)', pts: 4, gd: 1, desc: '한국에 불리한 스코어 상황' };
        } else {
          teamJ = { ...teamJ, name: 'J조 3위 (대기중)', pts: 3, gd: 0, desc: '경기 전 대기 상태' };
        }

        // K조 가상 계산
        let teamK = { id: 'K', name: 'K조 3위 (DR콩고)', group: 'K', pts: 3, gd: 0, fixed: false };
        if (statusK === 'success') {
          teamK = { ...teamK, name: 'DR콩고 🇨🇩 (K조 3위)', pts: 2, gd: -1, desc: '우즈벡 선방으로 DR콩고 저지' };
        } else if (statusK === 'fail') {
          teamK = { ...teamK, name: 'DR콩고 🇨🇩 (K조 3위)', pts: 4, gd: 1, desc: 'DR콩고가 이기면서 한국 추월' };
        } else {
          teamK = { ...teamK, name: 'K조 3위 (대기중)', pts: 3, gd: 0, desc: '경기 전 대기 상태' };
        }

        // L조 가상 계산
        let teamL = { id: 'L', name: 'L조 3위 (크로아티아)', group: 'L', pts: 3, gd: 0, fixed: false };
        if (statusL === 'success') {
          teamL = { ...teamL, name: '크로아티아 🇭🇷 (L조 3위)', pts: 3, gd: -2, desc: '가나 승리로 크로아티아 득실 하락' };
        } else if (statusL === 'fail') {
          teamL = { ...teamL, name: '크로아티아 🇭🇷 (L조 3위)', pts: 4, gd: 0, desc: '크로아티아 승점 추가' };
        } else {
          teamL = { ...teamL, name: 'L조 3위 (대기중)', pts: 3, gd: 0, desc: '경기 전 대기 상태' };
        }

        const allTeams = [...baseTeams, teamG, teamH, teamI, teamJ, teamK, teamL];

        return allTeams.sort((a, b) => {
          if (b.pts !== a.pts) return b.pts - a.pts;
          return b.gd - a.gd;
        });
      }, [scenarios, selectedTimeIdx]);

      // 사용자 예측 결과에 따른 단계별 진출 확률 동적 매핑
      const probabilityTrend = useMemo(() => {
        const baseProb = 67.93; // baseline 오피셜 확률

        const weights = {
          G: { success: 9.5, fail: -15.0 },
          H: { success: 9.5, fail: -15.0 },
          I: { success: 4.5, fail: -10.0 },
          J: { success: 4.5, fail: -10.0 },
          K: { success: 9.5, fail: -15.0 },
          L: { success: 10.5, fail: -15.0 },
        };

        const getEffectValue = (groupName) => {
          const s = scenarios.find(item => item.group === groupName);
          if (!s || s.selected === 'pending') return 0;
          const effect = s.options[s.selected].effect;
          return weights[groupName][effect];
        };

        let prob0 = baseProb;
        let prob1 = Math.max(0, Math.min(100, prob0 + getEffectValue('G')));
        let prob2 = Math.max(0, Math.min(100, prob1 + getEffectValue('H')));
        let prob3 = Math.max(0, Math.min(100, prob2 + getEffectValue('I') + getEffectValue('J')));
        let prob4 = Math.max(0, Math.min(100, prob3 + getEffectValue('K')));

        let prob5;
        const successes = scenarios.filter(s => s.selected !== 'pending' && s.options[s.selected].effect === 'success').length;
        const fails = scenarios.filter(s => s.selected !== 'pending' && s.options[s.selected].effect === 'fail').length;
        const totalSelected = successes + fails;

        if (totalSelected === 6) {
          prob5 = successes >= 3 ? 100 : 0;
        } else {
          prob5 = Math.max(0, Math.min(100, prob4 + getEffectValue('L')));
          if (successes >= 3) prob5 = Math.max(92, prob5);
          if (fails > 3) prob5 = Math.min(8, prob5);
        }

        return [
          { time: '14:00', val: parseFloat(prob0.toFixed(1)) },
          { time: '16:00', val: parseFloat(prob1.toFixed(1)) },
          { time: '18:00', val: parseFloat(prob2.toFixed(1)) },
          { time: '20:00', val: parseFloat(prob3.toFixed(1)) },
          { time: '00:00', val: parseFloat(prob4.toFixed(1)) },
          { time: '02:00', val: parseFloat(prob5.toFixed(1)) }
        ];
      }, [scenarios]);

      // 현재 시뮬레이션된 최신 시간의 확률 얻기
      const currentProbability = probabilityTrend[selectedTimeIdx].val;
      const initialProbability = probabilityTrend[0].val;
      const probabilityDiff = parseFloat((currentProbability - initialProbability).toFixed(1));

      // 조건 충족수
      const totalMet = useMemo(() => {
        return scenarios.filter(s => s.selected !== 'pending' && s.options[s.selected].effect === 'success').length;
      }, [scenarios]);

      const totalFailed = useMemo(() => {
        return scenarios.filter(s => s.selected !== 'pending' && s.options[s.selected].effect === 'fail').length;
      }, [scenarios]);

      const koreaRank = standings.findIndex(t => t.id === 'KOR') + 1;

      const koreaStatus = useMemo(() => {
        if (totalMet >= 3) {
          return {
            label: '32강 진출 확정',
            colorClass: 'text-emerald-400 bg-emerald-950/40 border-emerald-500/20',
            badgeClass: 'bg-emerald-500 text-white',
            desc: '축하합니다! 희망 경기 아웃컴 3개 이상이 매칭되어 대한민국이 와일드카드로 32강행을 매듭짓습니다.'
          };
        } else if (totalFailed > 3) {
          return {
            label: '조별리그 탈락 확정',
            colorClass: 'text-red-400 bg-red-950/40 border-red-500/20',
            badgeClass: 'bg-red-500 text-white',
            desc: '아쉽게도 탈락 조건이 누적되어 상위 8개 와일드카드 진출국 안에 합류하지 못했습니다.'
          };
        } else {
          return {
            label: '실시간 조건 연산중',
            colorClass: 'text-amber-400 bg-amber-950/40 border-amber-500/20',
            badgeClass: 'bg-amber-500 text-slate-950',
            desc: '남은 경기의 시간대별 결과에 따라 운명이 결정됩니다. 하단의 국가 국기 매치를 선택해 확률 변동을 예측해 보세요.'
          };
        }
      }, [totalMet, totalFailed]);

      // 주식 전광판용 프리미엄 라인 그래프 드로잉 좌표 (viewBox="0 0 500 150")
      const chartPoints = useMemo(() => {
        const xCoords = [35, 120, 205, 290, 375, 465];
        const points = probabilityTrend.map((pt, i) => {
          const x = xCoords[i];
          const y = 140 - (pt.val / 100) * 115;
          return { x, y, val: pt.val, time: pt.time };
        });

        const linePath = points.reduce((path, pt, i) => {
          return path + (i === 0 ? `M ${pt.x} ${pt.y}` : ` L ${pt.x} ${pt.y}`);
        }, '');

        const areaPath = linePath + ` L ${points[points.length - 1].x} 140 L ${points[0].x} 140 Z`;

        return { points, linePath, areaPath };
      }, [probabilityTrend]);

      return (
        <div className="min-h-screen bg-slate-950 text-slate-100 p-4 md:p-8 antialiased">
          
          {/* 상단 글로벌 헤더 */}
          <header className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between border-b border-slate-900 pb-5 mb-6 gap-4">
            <div className="flex items-center gap-3">
              <div className="bg-red-600 p-2 rounded-xl shadow-lg shadow-red-600/10">
                <Flame className="w-6 h-6 text-white" />
              </div>
              <div>
                <h1 className="text-lg md:text-xl font-extrabold tracking-tight text-white flex items-center gap-2">
                  2026 월드컵 대한민국 <span className="text-red-500">32강 경우의 수 대시보드</span>
                </h1>
                <p className="text-xs text-slate-500 flex items-center gap-1 mt-0.5 font-mono">
                  <Calendar className="w-3.5 h-3.5" /> 2026. 06. 26. 14:45 KST (G~L조 시나리오 시뮬레이션 모델)
                </p>
              </div>
            </div>
            
            <div className="flex gap-2">
              <button 
                onClick={() => setShowHelpModal(true)}
                className="px-3 py-1.5 text-xs font-semibold text-slate-300 bg-slate-900 border border-slate-800 rounded-lg hover:bg-slate-800 transition flex items-center gap-1.5"
              >
                <HelpCircle className="w-3.5 h-3.5" /> 와일드카드 정보
              </button>
              <button 
                onClick={() => applyPreset('reset')}
                className="px-3 py-1.5 text-xs font-semibold text-slate-300 bg-slate-900 border border-slate-800 rounded-lg hover:bg-slate-800 transition flex items-center gap-1.5"
              >
                <RotateCcw className="w-3.5 h-3.5" /> 기본화면 리셋
              </button>
            </div>
          </header>

          <main className="max-w-6xl mx-auto space-y-6">
            
            {/* 레이아웃 파트 1: 초대형 전광판 대시보드 및 주식형 확률 그래프 */}
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              
              {/* 왼쪽 2열: 초대형 확률 패널 + 주식형 실시간 변동 차트 */}
              <div className="lg:col-span-2 bg-slate-900/40 border border-slate-850 rounded-2xl p-6 backdrop-blur-md relative overflow-hidden flex flex-col justify-between">
                <div className="absolute top-0 right-0 w-48 h-48 bg-amber-500/5 blur-3xl rounded-full"></div>
                
                {/* 1. 초대형 확률 전광판 */}
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 pb-6 border-b border-slate-850/60">
                  <div>
                    <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1">
                      KOREA PROBABILITY INDEX
                    </span>
                    <h2 className="text-sm font-extrabold text-slate-300 flex items-center gap-1.5">
                      대한민국 32강 와일드카드 생존 확률
                    </h2>
                  </div>
                  
                  {/* 거대 지표 숫자 */}
                  <div className="flex items-baseline gap-3">
                    <span className="text-5xl md:text-6xl font-black tracking-tighter text-amber-400 font-mono drop-shadow-[0_0_20px_rgba(245,158,11,0.2)]">
                      {currentProbability}%
                    </span>
                    <div className="flex flex-col">
                      <span className={`text-xs font-bold font-mono px-2 py-0.5 rounded ${
                        probabilityDiff >= 0 ? 'text-emerald-400 bg-emerald-950/40' : 'text-red-400 bg-red-950/40'
                      }`}>
                        {probabilityDiff >= 0 ? `▲ +${probabilityDiff}%` : `▼ ${probabilityDiff}%`}
                      </span>
                      <span className="text-[9px] text-slate-500 text-right mt-1">vs 14:00 시작전</span>
                    </div>
                  </div>
                </div>

                {/* 2. 주식 거래소 스타일 확률 변동 그래프 */}
                <div className="py-4">
                  <div className="flex items-center justify-between mb-3 text-xs">
                    <span className="text-slate-400 font-semibold flex items-center gap-1">
                      <TrendingUp className="w-3.5 h-3.5 text-amber-500" /> 실시간 변동 가이드라인 (시간대별)
                    </span>
                    <span className="text-slate-500 font-mono">가로축: KST 시간별 경기 시나리오 매칭</span>
                  </div>

                  <div className="bg-slate-950/80 rounded-xl p-3 border border-slate-850/60 relative">
                    <svg viewBox="0 0 500 150" className="w-full h-auto overflow-visible">
                      <defs>
                        <linearGradient id="chart-area-grad" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="0%" stopColor="#f59e0b" stopOpacity="0.22"/>
                          <stop offset="100%" stopColor="#f59e0b" stopOpacity="0.0"/>
                        </linearGradient>
                        <linearGradient id="chart-line-grad" x1="0" y1="0" x2="1" y2="0">
                          <stop offset="0%" stopColor="#f59e0b" />
                          <stop offset="100%" stopColor="#ef4444" />
                        </linearGradient>
                      </defs>

                      {/* 격자 수평선 */}
                      <line x1="35" y1="25" x2="465" y2="25" stroke="#1e293b" strokeDasharray="3" strokeWidth="0.5" />
                      <text x="30" y="28" fill="#475569" fontSize="7" textAnchor="end" fontFamily="monospace">100%</text>

                      <line x1="35" y1="82.5" x2="465" y2="82.5" stroke="#1e293b" strokeDasharray="3" strokeWidth="0.5" />
                      <text x="30" y="85.5" fill="#475569" fontSize="7" textAnchor="end" fontFamily="monospace">50%</text>

                      <line x1="35" y1="140" x2="465" y2="140" stroke="#1e293b" strokeWidth="0.5" />
                      <text x="30" y="143" fill="#475569" fontSize="7" textAnchor="end" fontFamily="monospace">0%</text>

                      {/* 면적 그라데이션 그리기 */}
                      <path d={chartPoints.areaPath} fill="url(#chart-area-grad)" />

                      {/* 라인 드로잉 */}
                      <path d={chartPoints.linePath} fill="none" stroke="url(#chart-line-grad)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />

                      {/* 축별 포인트 서클 렌더링 */}
                      {chartPoints.points.map((pt, i) => {
                        const isSelected = i === selectedTimeIdx;
                        return (
                          <g key={i}>
                            {isSelected && (
                              <circle cx={pt.x} cy={pt.y} r="8" fill="#f59e0b" fillOpacity="0.25" className="animate-ping" />
                            )}
                            <circle 
                              cx={pt.x} 
                              cy={pt.y} 
                              r={isSelected ? "5" : "3.5"} 
                              fill={isSelected ? "#f59e0b" : "#334155"} 
                              stroke="#020617" 
                              strokeWidth="1.5"
                              className="cursor-pointer hover:scale-125 transition-transform"
                              onClick={() => setSelectedTimeIdx(i)}
                            />
                            <text x={pt.x} y={pt.y - 10} fill={isSelected ? "#f59e0b" : "#64748b"} fontSize="8" fontWeight="bold" textAnchor="middle" fontFamily="monospace">
                              {pt.val}%
                            </text>
                            <text x={pt.x} y="148" fill={isSelected ? "#f59e0b" : "#475569"} fontSize="8" fontWeight={isSelected ? "bold" : "normal"} textAnchor="middle">
                              {pt.time}
                            </text>
                          </g>
                        );
                      })}
                    </svg>
                  </div>
                </div>

                {/* 3. 실시간 타임 트래커 슬라이더 */}
                <div className="pt-3 border-t border-slate-850/60 mt-2">
                  <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-1 mb-2 text-xs">
                    <span className="text-slate-400 font-semibold flex items-center gap-1">
                      <Clock className="w-3.5 h-3.5 text-slate-500" /> 타임 트래커 시점 동기화
                    </span>
                    <span className="text-slate-500">
                      슬라이더 위치: <strong className="text-amber-400">{timelineMilestones[selectedTimeIdx].time} ({timelineMilestones[selectedTimeIdx].label})</strong>
                    </span>
                  </div>
                  <div className="space-y-1">
                    <input 
                      type="range" 
                      min="0" 
                      max="5" 
                      value={selectedTimeIdx}
                      onChange={(e) => setSelectedTimeIdx(parseInt(e.target.value))}
                      className="w-full accent-amber-500 bg-slate-950 h-2 rounded-lg cursor-pointer border border-slate-800"
                    />
                    <div className="grid grid-cols-6 text-[9px] text-center text-slate-500 font-bold">
                      {timelineMilestones.map((mil, idx) => (
                        <div 
                          key={idx}
                          onClick={() => setSelectedTimeIdx(idx)}
                          className={`cursor-pointer transition-colors ${idx === selectedTimeIdx ? 'text-amber-400' : 'hover:text-slate-300'}`}
                        >
                          {mil.time}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

              </div>

              {/* 오른쪽 1열: 실시간 응원방 및 가상 훈수방 (추천 기능 포함) */}
              <div className="bg-slate-900/40 border border-slate-850 rounded-2xl p-5 flex flex-col justify-between backdrop-blur-md">
                
                {/* 댓글창 상단 헤더 */}
                <div className="pb-3 border-b border-slate-850/60 flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <MessageSquare className="w-4 h-4 text-amber-500" />
                    <h3 className="text-sm font-bold text-slate-200">실시간 경우의 수 훈수방</h3>
                  </div>
                  <span className="text-[10px] bg-slate-800 px-2 py-0.5 rounded-full text-slate-400 font-mono">
                    {comments.length}명 참여중
                  </span>
                </div>

                {/* 댓글 목록 */}
                <div className="flex-1 overflow-y-auto max-h-[220px] lg:max-h-[250px] space-y-3 py-3 pr-1">
                  {comments.map((comment) => (
                    <div key={comment.id} className="bg-slate-950/60 rounded-lg p-2.5 border border-slate-850/40 text-xs">
                      <div className="flex justify-between items-center mb-1">
                        <span className="font-bold text-amber-400">{comment.nickname}</span>
                        <span className="text-[9px] text-slate-500 font-mono">{comment.time}</span>
                      </div>
                      <p className="text-slate-300 mb-2 leading-relaxed">{comment.text}</p>
                      
                      {/* 추천(따봉) 버튼 */}
                      <div className="flex justify-end">
                        <button 
                          onClick={() => handleLikeComment(comment.id)}
                          className="flex items-center gap-1 px-2 py-0.5 rounded bg-slate-900 border border-slate-800 text-[10px] text-slate-400 hover:text-amber-400 hover:border-amber-500/20 transition-all"
                        >
                          <ThumbsUp className="w-3 h-3" />
                          <span>추천 {comment.likes}</span>
                        </button>
                      </div>
                    </div>
                  ))}
                </div>

                {/* 댓글 전송 입력 폼 */}
                <form onSubmit={handleAddComment} className="pt-3 border-t border-slate-850/60 space-y-2">
                  <div className="flex gap-2">
                    <input 
                      type="text" 
                      placeholder="닉네임"
                      value={nicknameInput}
                      onChange={(e) => setNicknameInput(e.target.value)}
                      maxLength="10"
                      className="w-1/3 bg-slate-950/80 border border-slate-800 rounded-lg p-1.5 text-xs text-slate-200 focus:outline-none focus:border-amber-500/50"
                    />
                    <input 
                      type="text" 
                      placeholder="훈수 한마디 적기..."
                      value={commentInput}
                      onChange={(e) => setCommentInput(e.target.value)}
                      maxLength="45"
                      className="w-2/3 bg-slate-950/80 border border-slate-800 rounded-lg p-1.5 text-xs text-slate-200 focus:outline-none focus:border-amber-500/50"
                    />
                  </div>
                  <button 
                    type="submit"
                    className="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold text-xs py-1.5 rounded-lg transition"
                  >
                    응원 전송하기
                  </button>
                </form>

              </div>

            </div>

            {/* 레이아웃 파트 2: 시간순 경기 시나리오 나열 (국기 비주얼 극대화) & 와일드카드 테이블 */}
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              
              {/* 왼쪽 2열: 시간순 시나리오 및 카드 나열 */}
              <div className="lg:col-span-2 space-y-4">
                <h3 className="text-sm font-extrabold text-slate-300 flex items-center gap-2">
                  <Clock className="w-4 h-4 text-amber-500" />
                  시간 순서별 32강 영향 매치 타임라인
                </h3>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {scenarios.map((scenario) => {
                    const isPassedSelectedTime = scenario.timeSlot <= selectedTimeIdx;
                    
                    return (
                      <div 
                        key={scenario.id}
                        className={`bg-slate-900/40 border rounded-xl p-4 flex flex-col justify-between transition-all ${
                          !isPassedSelectedTime ? 'opacity-30 border-slate-900 bg-slate-950/60 grayscale' :
                          scenario.selected !== 'pending' && scenario.options[scenario.selected].effect === 'success' ? 'border-emerald-500/30 bg-emerald-950/5 shadow-[0_0_12px_rgba(16,185,129,0.03)]' : 
                          scenario.selected !== 'pending' && scenario.options[scenario.selected].effect === 'fail' ? 'border-red-500/30 bg-red-950/5' : 'border-slate-800'
                        }`}
                      >
                        <div>
                          
                          {/* 최상단 라벨 및 타임라인 배지 */}
                          <div className="flex justify-between items-center mb-3">
                            <span className="text-[10px] font-black px-2 py-0.5 bg-slate-800 rounded-full text-slate-300 tracking-wider">
                              조별리그 {scenario.group}조 • {timelineMilestones[scenario.timeSlot].time}
                            </span>
                            
                            {!isPassedSelectedTime ? (
                              <span className="text-[9px] text-slate-500 font-bold bg-slate-950 px-2 py-0.5 rounded-full border border-slate-900">
                                시간축 잠김
                              </span>
                            ) : scenario.selected === 'pending' ? (
                              <span className="text-[9px] text-slate-400 font-bold flex items-center gap-1 bg-slate-950 px-2 py-0.5 rounded-full border border-slate-850">
                                <span className="w-1.5 h-1.5 rounded-full bg-slate-500 animate-pulse"></span> 경기대기
                              </span>
                            ) : (
                              <span className={`text-[9px] font-bold flex items-center gap-1 px-2 py-0.5 rounded-full border ${
                                scenario.options[scenario.selected].effect === 'success'
                                  ? 'text-emerald-400 bg-emerald-950 border-emerald-500/10'
                                  : 'text-red-400 bg-red-950 border-red-500/10'
                              }`}>
                                {scenario.options[scenario.selected].effect === 'success' ? '한국 우세매칭' : '한국 불리매칭'}
                              </span>
                            )}
                          </div>

                          {/* 국기 비주얼 극대화 매치업 표시 */}
                          <div className="flex items-center gap-3.5 mb-2.5">
                            <div className="flex items-center -space-x-2">
                              <span className="text-3xl filter drop-shadow">{scenario.flagHome}</span>
                              <span className="text-3xl filter drop-shadow">{scenario.flagAway}</span>
                            </div>
                            <h4 className="text-sm font-black text-white">{scenario.title}</h4>
                          </div>

                          <p className="text-slate-400 text-xs leading-relaxed mb-4">
                            {scenario.detail}
                          </p>

                        </div>

                        {/* 옵션 스위치 패널 */}
                        <div className="space-y-2 mt-auto">
                          {scenario.options.map((opt, idx) => {
                            const isSelected = scenario.selected === idx;
                            return (
                              <button
                                key={idx}
                                disabled={!isPassedSelectedTime}
                                onClick={() => handleOptionSelect(scenario.id, idx)}
                                className={`w-full text-left p-2.5 rounded-xl border transition-all text-xs flex justify-between items-center ${
                                  !isPassedSelectedTime ? 'bg-slate-950/20 border-slate-900 text-slate-600 cursor-not-allowed' :
                                  isSelected
                                    ? opt.effect === 'success'
                                      ? 'bg-emerald-950/40 border-emerald-500/50 text-emerald-300'
                                      : 'bg-red-950/40 border-red-500/50 text-red-300'
                                    : 'bg-slate-950/60 border-slate-850 hover:border-slate-700 text-slate-300'
                                }`}
                              >
                                <div>
                                  <span className="font-bold block">{opt.label}</span>
                                  <span className={`text-[9px] block mt-0.5 ${isSelected ? 'text-slate-200' : 'text-slate-500'}`}>
                                    {opt.desc}
                                  </span>
                                </div>
                                {isPassedSelectedTime && isSelected && (
                                  <span className={`text-[9px] font-black px-1.5 py-0.5 rounded ${
                                    opt.effect === 'success' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-red-500/10 text-red-400'
                                  }`}>
                                    {opt.effect === 'success' ? '유리' : '불리'}
                                  </span>
                                )}
                              </button>
                            );
                          })}
                        </div>

                      </div>
                    );
                  })}
                </div>

                <div className="bg-slate-900/10 border border-slate-850 rounded-xl p-4 flex gap-3 text-xs text-slate-500">
                  <Info className="w-4 h-4 text-slate-500 shrink-0 mt-0.5" />
                  <div>
                    <p className="font-semibold text-slate-400 mb-1">인터랙티브 가이드라인</p>
                    <p className="leading-relaxed">
                      상단의 <strong>시간축 슬라이더</strong>를 움직여 원하는 시간대를 먼저 고르고, 해당 시간대 및 이전 시간대의 경기 카드를 조작해 보세요. 미래 시간대의 경기는 자동으로 비활성화 처리되어 시간대별 정확한 가상 시뮬레이션이 성립됩니다.
                    </p>
                  </div>
                </div>

              </div>

              {/* 오른쪽 1열: 실시간 조별리그 3위 순위표 */}
              <div className="space-y-4">
                <h3 className="text-sm font-extrabold text-slate-300 flex items-center gap-2">
                  <Award className="w-4 h-4 text-yellow-500" />
                  <span>실시간 3위 테이블 ({timelineMilestones[selectedTimeIdx].time} 기준)</span>
                </h3>

                <div className="bg-slate-900/60 border border-slate-850 rounded-2xl overflow-hidden backdrop-blur-md shadow-xl">
                  <div className="p-3 bg-slate-950 border-b border-slate-850 text-[10px] text-slate-400 flex items-center justify-between font-bold">
                    <span>RANK & NATION</span>
                    <div className="flex gap-4">
                      <span className="w-8 text-center">승점</span>
                      <span className="w-8 text-center">득실</span>
                      <span className="w-6 text-center">결과</span>
                    </div>
                  </div>

                  <div className="divide-y divide-slate-850">
                    {standings.map((team, index) => {
                      const rank = index + 1;
                      const isKorea = team.id === 'KOR';
                      const isPassZone = rank <= 8;

                      return (
                        <div 
                          key={team.id} 
                          className={`p-2.5 flex items-center justify-between transition-all duration-300 ${
                            isKorea 
                              ? 'bg-slate-800/80 border-y-2 border-amber-500/60 shadow-lg relative z-10' 
                              : isPassZone 
                                ? 'hover:bg-slate-900/40' 
                                : 'bg-red-950/5 hover:bg-red-950/10'
                          }`}
                        >
                          <div className="flex items-center gap-2">
                            <span className={`w-5 text-center font-mono text-xs font-bold ${
                              isKorea ? 'text-amber-400' : isPassZone ? 'text-slate-400' : 'text-slate-600'
                            }`}>
                              {rank}
                            </span>
                            
                            <div>
                              <div className="flex items-center gap-1.5">
                                <span className={`text-xs font-bold ${isKorea ? 'text-amber-400 font-extrabold' : 'text-slate-200'}`}>
                                  {team.name}
                                </span>
                                <span className="text-[9px] font-black font-mono text-slate-500 px-1 py-0.2 bg-slate-950 border border-slate-850 rounded">
                                  {team.group}조
                                </span>
                              </div>
                              <span className="text-[9px] text-slate-500 font-medium block">
                                {team.desc}
                              </span>
                            </div>
                          </div>

                          <div className="flex gap-4 text-xs font-semibold items-center font-mono">
                            <span className={`w-8 text-center ${isKorea ? 'text-amber-400 font-black' : 'text-slate-300'}`}>
                              {team.pts}
                            </span>
                            <span className={`w-8 text-center ${
                              team.gd > 0 ? 'text-emerald-400' : team.gd < 0 ? 'text-red-400' : 'text-slate-400'
                            }`}>
                              {team.gd > 0 ? `+${team.gd}` : team.gd}
                            </span>
                            
                            <span className="w-6 flex justify-center">
                              {isPassZone ? (
                                <span className="w-4 h-4 rounded-full bg-emerald-950 border border-emerald-500/30 text-[9px] font-black text-emerald-400 flex items-center justify-center">
                                  P
                                </span>
                              ) : (
                                <span className="w-4 h-4 rounded-full bg-red-950 border border-red-500/30 text-[9px] font-black text-red-400 flex items-center justify-center">
                                  F
                                </span>
                              )}
                            </span>
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  <div className="p-3 bg-slate-950 border-t border-slate-850 flex items-center justify-between text-[11px] text-slate-400">
                    <span className="flex items-center gap-1">
                      <span className="w-2.5 h-2.5 rounded bg-emerald-500/20 border border-emerald-500/30"></span> 1~8위 와일드카드 진출
                    </span>
                    <span className="flex items-center gap-1">
                      <span className="w-2.5 h-2.5 rounded bg-red-500/10 border border-red-500/30"></span> 9~12위 진출 탈락
                    </span>
                  </div>
                </div>
              </div>

            </div>

          </main>

          {/* 와일드카드 가이드 팝업 */}
          {showHelpModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm p-4">
              <div className="bg-slate-900 border border-slate-800 rounded-2xl max-w-md w-full p-6 shadow-2xl relative">
                <h4 className="text-base font-bold text-white mb-3 flex items-center gap-2">
                  <HelpCircle className="w-5 h-5 text-amber-500" />
                  경우의 수 및 와일드카드 규정 안내
                </h4>
                
                <div className="space-y-3.5 text-xs text-slate-300 leading-relaxed">
                  <p>
                    이번 2026 월드컵은 참가국이 48개국으로 대폭 확대되면서, 기존과 완전히 다른 새로운 조별리그 룰이 적용됩니다.
                  </p>
                  
                  <div className="bg-slate-950 p-3 rounded-lg border border-slate-850 space-y-1.5 font-medium text-slate-400">
                    <p className="text-amber-500 font-bold mb-1">핵심 요약 규칙</p>
                    <p>1. 각 조 1위 및 2위(총 24개팀)는 무조건 진출</p>
                    <p>2. 조 3위 12개 국가 중 성적 상위 8개 팀만 32강 합류</p>
                    <p>3. 조 3위 성적 비교: 승점 → 골득실 → 다득점 순</p>
                  </div>

                  <p>
                    대한민국은 최종 성적 <strong>승점 3점, 골득실 -1</strong>로 조 3위가 이미 확정되었습니다. 앞서 타 조의 경기 결과들로 인해 다른 조 3위인 보스니아, 에콰도르, 스웨덴, 파라과이는 전부 한국을 넘어섰습니다.
                  </p>
                  <p>
                    따라서 한국이 살아남기 위해선 아직 경기가 다 끝나지 않은 <strong>G, H, I, J, K, L조 중 최소 3개조 이상의 3위 성적이 한국(3점, -1) 이하가 되어야만 합니다.</strong>
                  </p>
                </div>

                <button 
                  onClick={() => setShowHelpModal(false)}
                  className="mt-6 w-full py-2 bg-slate-800 hover:bg-slate-750 font-bold text-xs text-white rounded-lg transition"
                >
                  확인했습니다
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
