            { label: '세네갈 1골 차 승리 🇸🇳', effect: 'success', desc: 'I조 3위 골득실 -2 이하 (한국에 유리)' },
            { label: '이라크 4골 차이하 승리 🇮🇶', effect: 'success', desc: 'I조 3위 골득실 -2 이하 (한국에 유리)' },
            { label: '무승부 또는 기타 대승 결과', effect: 'fail', desc: '해당 팀 승점 4점 획득 (한국에 불리)' }
          ],

          detail: '오스트리아가 깔끔하게 이기거나, 알제리가 대승하여 오스트리아의 골득실을 대폭 깎아내려야 합니다.',

        {

          group: 'L',
          title: '가나 🇬🇭 vs 크로아티아 🇭🇷',
          timeSlot: 5, // 02:00
          detail: '가나가 크로아티아를 꺾어주면 크로아티아는 승점 3점에 머물고 골득실이 더 떨어져 한국이 앞섭니다.',

      const [scenarios, setScenarios] = useState(initialScenarios);
      const [showHelpModal, setShowHelpModal] = useState(false);

      const handleOptionSelect = (id, optionIdx) => {
        setScenarios(prev => prev.map(s => {
          if (s.id === id) {
            return { ...s, selected: s.selected === optionIdx ? 'pending' : optionIdx };
          }
          return s;
        }));
      };

      const applyPreset = (type) => {
        if (type === 'best') {
          setScenarios(prev => prev.map(s => {
            const successIdx = s.options.findIndex(opt => opt.effect === 'success');
            return { ...s, selected: successIdx !== -1 ? successIdx : 'pending' };
          }));
          setSelectedTimeIdx(5);
        } else if (type === 'worst') {
          setScenarios(prev => prev.map(s => {
            const failIdx = s.options.findIndex(opt => opt.effect === 'fail');
            return { ...s, selected: failIdx !== -1 ? failIdx : 'pending' };
          }));
          setSelectedTimeIdx(5);
        } else if (type === 'cutoff') {
          setScenarios(prev => prev.map(s => {
            const targetEffect = [1, 2, 5].includes(s.id) ? 'success' : 'fail';
            const idx = s.options.findIndex(opt => opt.effect === targetEffect);
            return { ...s, selected: idx !== -1 ? idx : 'pending' };
          }));
          setSelectedTimeIdx(5);
        } else {
          setScenarios(prev => prev.map(s => ({ ...s, selected: 'pending' })));
          setSelectedTimeIdx(0); // 시작 전으로 이동
        }
      };

      const getActiveStatusAtSelectedTime = (groupName) => {
        const scenario = scenarios.find(s => s.group === groupName);
        if (!scenario) return 'pending';
        
        // 만약 선택된 시간축보다 경기 종료 스케줄이 뒷시간대라면 'pending' 상태로 보여줌
        if (scenario.timeSlot > selectedTimeIdx) {
          return 'pending';
        }
        
        if (scenario.selected === 'pending') return 'pending';
        return scenario.options[scenario.selected].effect;
      };

      // 12개조 3위 테이블 연산 (타임슬라이더 동기화)

        const baseTeams = [
          { id: 'KOR', name: '대한민국 🇰🇷', group: 'A', pts: 3, gd: -1, fixed: true, desc: '한국 조별리그 최종 성적' },
          { id: 'BIH', name: '보스니아 🇧🇦', group: 'B', pts: 4, gd: 0, fixed: true, desc: '진출 유력 (승점 4)' },

          { id: 'SWE', name: '스웨덴 🇸🇪', group: 'F', pts: 4, gd: 1, fixed: true, desc: '진출 유력 (승점 4)' },
        ];

        const statusG = getActiveStatusAtSelectedTime('G');
        const statusH = getActiveStatusAtSelectedTime('H');
        const statusI = getActiveStatusAtSelectedTime('I');
        const statusJ = getActiveStatusAtSelectedTime('J');
        const statusK = getActiveStatusAtSelectedTime('K');
        const statusL = getActiveStatusAtSelectedTime('L');

        // G조 가상 계산
        let teamG = { id: 'G', name: 'G조 3위 (이란/벨기에)', group: 'G', pts: 3, gd: 0, fixed: false };

          teamG = { ...teamG, name: '이란 🇮🇷 (G조 3위)', pts: 2, gd: -2, desc: '이집트 승리로 이란 부진' };
        } else if (statusG === 'fail') {
          teamG = { ...teamG, name: '벨기에 🇧🇪 (G조 3위)', pts: 4, gd: 0, desc: '이란 무승부 이상으로 승점 상승' };
        } else {
          teamG = { ...teamG, name: 'G조 3위 (대기중)', pts: 3, gd: 0, desc: '경기 전 대기 상태' };
        }

        // H조 가상 계산
        let teamH = { id: 'H', name: 'H조 3위 (우루과이)', group: 'H', pts: 3, gd: 0, fixed: false };
        if (statusH === 'success') {
          teamH = { ...teamH, name: '우루과이 🇺🇾 (H조 3위)', pts: 2, gd: -2, desc: '스페인 승리로 우루과이 차단' };
        } else if (statusH === 'fail') {
          teamH = { ...teamH, name: '우루과이 🇺🇾 (H조 3위)', pts: 4, gd: 0, desc: '우루과이 승점 획득에 성공' };

        // I조 가상 계산

        if (statusL === 'success') {
          teamL = { ...teamL, name: '크로아티아 🇭🇷 (L조 3위)', pts: 3, gd: -2, desc: '가나 승리로 크로아티아 득실 하락' };
        } else if (statusL === 'fail') {
          teamL = { ...teamL, name: '크로아티아 🇭🇷 (L조 3위)', pts: 4, gd: 0, desc: '크로아티아 승점 추가' };
        } else {
          teamL = { ...teamL, name: 'L조 3위 (대기중)', pts: 3, gd: 0, desc: '경기 전 대기 상태' };
        }

        const allTeams = [...baseTeams, teamG, teamH, teamI, teamJ, teamK, teamL];

        return allTeams.sort((a, b) => {
          if (b.pts !== a.pts) return b.pts - a.pts;
          return b.gd - a.gd;
        });
      }, [scenarios, selectedTimeIdx]);

      // 사용자 예측 기반 각 시간대별 누적 진출 확률 계산 함수
      const probabilityTrend = useMemo(() => {
        const baseProb = 67.93; // 14:00 오피셜 baseline 확률

        // 6개 시나리오 각각의 영향도 정의
        const weights = {
          G: { success: 9.5, fail: -15.0 },
          H: { success: 9.5, fail: -15.0 },
          I: { success: 4.5, fail: -10.0 },
          J: { success: 4.5, fail: -10.0 },
          K: { success: 9.5, fail: -15.0 },
          L: { success: 10.5, fail: -15.0 },
        };

        const getEffectValue = (groupName) => {
          const s = scenarios.find(item => item.group === groupName);
          if (!s || s.selected === 'pending') return 0; // 아직 판단 보류 상태면 변동치 없음 (중립적 점진 변동)
          const effect = s.options[s.selected].effect;
          return weights[groupName][effect];
        };

        // 14:00 (Step 0)
        let prob0 = baseProb;

        // 16:00 (Step 1) - G조 종료
        let prob1 = Math.max(0, Math.min(100, prob0 + getEffectValue('G')));

        // 18:00 (Step 2) - H조 종료
        let prob2 = Math.max(0, Math.min(100, prob1 + getEffectValue('H')));

        // 20:00 (Step 3) - I 및 J조 종료
        let prob3 = Math.max(0, Math.min(100, prob2 + getEffectValue('I') + getEffectValue('J')));

        // 00:00 (Step 4) - K조 종료
        let prob4 = Math.max(0, Math.min(100, prob3 + getEffectValue('K')));

        // 02:00 (Step 5) - L조 종료 (최종 판단)
        let prob5;
        
        // 수학적 확정성 연산 (성공 개수 카운트)
        const successes = scenarios.filter(s => s.selected !== 'pending' && s.options[s.selected].effect === 'success').length;
        const fails = scenarios.filter(s => s.selected !== 'pending' && s.options[s.selected].effect === 'fail').length;
        const totalSelected = successes + fails;

        if (totalSelected === 6) {
          // 6개 전 경기 종료 시 확률은 완전히 100% 또는 0%로 확정됨
          prob5 = successes >= 3 ? 100 : 0;
        } else {
          prob5 = Math.max(0, Math.min(100, prob4 + getEffectValue('L')));
          // 예측 기대값 보정
          if (successes >= 3) prob5 = Math.max(92, prob5);
          if (fails > 3) prob5 = Math.min(8, prob5);
        }

        return [
          { time: '14:00', val: parseFloat(prob0.toFixed(1)) },
          { time: '16:00', val: parseFloat(prob1.toFixed(1)) },
          { time: '18:00', val: parseFloat(prob2.toFixed(1)) },
          { time: '20:00', val: parseFloat(prob3.toFixed(1)) },
          { time: '00:00', val: parseFloat(prob4.toFixed(1)) },
          { time: '02:00', val: parseFloat(prob5.toFixed(1)) }
        ];
      }, [scenarios]);

      // 현재 타임슬라이더 위치에서의 한국 대표팀 확률값 얻기
      const currentProbability = probabilityTrend[selectedTimeIdx].val;

      // 최종 조건 판독용 개수 구하기
      const totalMet = useMemo(() => {
        return scenarios.filter(s => {
          if (s.selected === 'pending') return false;
          return s.options[s.selected].effect === 'success';
        }).length;
      }, [scenarios]);

      const totalFailed = useMemo(() => {
        return scenarios.filter(s => {
          if (s.selected === 'pending') return false;
          return s.options[s.selected].effect === 'fail';
        }).length;
      }, [scenarios]);

      const koreaStatus = useMemo(() => {
        if (totalMet >= 3) {
          return {
            label: '32강 진출 확정',
            badge: 'bg-emerald-500 text-white',
            icon: <CheckCircle className="w-8 h-8 text-emerald-400 animate-bounce" />,
            desc: '축하합니다! 최소 3개 이상의 희망 조건이 성립하여 대한민국이 와일드카드로 32강 토너먼트에 극적으로 합류합니다!'
          };
        } else if (totalFailed > 3) {
          return {
            label: '조별리그 탈락 확정',
            badge: 'bg-red-500 text-white',
            icon: <XCircle className="w-8 h-8 text-red-400" />,
            desc: '아쉽게도 탈락 조건이 4개 이상 누적되어 대한민국이 상위 8개 와일드카드 진입에 실패했습니다.'
          };
        } else {
          return {
            label: '진출 대기중 (경우의 수 연산)',
            badge: 'bg-amber-500 text-slate-950',
            icon: <AlertCircle className="w-8 h-8 text-amber-400 animate-pulse" />,
            desc: '남은 경기의 결과에 따라 생존 여부가 결정됩니다. 아래 각 경기 카드의 예상 스코어를 터치하여 시뮬레이션해보세요.'
          };
        }
      }, [totalMet, totalFailed]);

      // SVG 그래프 포인트 드로잉 좌표 계산 (viewBox="0 0 500 200")
      const chartPoints = useMemo(() => {
        const xCoords = [40, 125, 210, 295, 380, 465]; // 등간격 배치
        const points = probabilityTrend.map((pt, i) => {
          const x = xCoords[i];
          // Y좌표 매핑: 100% -> Y=20, 0% -> Y=170
          const y = 170 - (pt.val / 100) * 150;
          return { x, y, val: pt.val, time: pt.time };
        });
        
        // 라인 path 문자열 생성
        const linePath = points.reduce((path, pt, i) => {
          return path + (i === 0 ? `M ${pt.x} ${pt.y}` : ` L ${pt.x} ${pt.y}`);
        }, '');

        // 채우기용 면적 path 문자열 생성 (닫힌 도형)
        const areaPath = linePath + ` L ${points[points.length - 1].x} 170 L ${points[0].x} 170 Z`;

        return { points, linePath, areaPath };
      }, [probabilityTrend]);

      return (
        <div className="min-h-screen bg-slate-950 text-slate-100 font-sans p-4 md:p-8 antialiased">
          <header className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between border-b border-slate-800 pb-6 mb-8 gap-4">
            <div className="flex items-center gap-3">
              <div className="bg-red-600 p-2.5 rounded-xl shadow-lg shadow-red-600/20">
                <Flame className="w-6 h-6 text-white animate-pulse" />
              </div>
              <div>
                <h1 className="text-xl md:text-2xl font-black tracking-tight text-white flex items-center gap-2">
                  홍명보호 32강 실시간 <span className="text-red-500">확률 시뮬레이터</span>
                </h1>
                <p className="text-xs text-slate-400 flex items-center gap-1.5 mt-0.5">
                  <Calendar className="w-3 h-3" /> 2026. 06. 26. 14:43 KST (경기 진행 일정 최적화)
                </p>
              </div>
            </div>

            <div className="flex gap-2 flex-wrap justify-center">
              <button 
                onClick={() => setShowHelpModal(true)}
                className="flex items-center gap-1.5 px-3.5 py-1.5 text-xs font-semibold text-slate-300 bg-slate-900 border border-slate-800 rounded-lg hover:bg-slate-800 transition"
              >
                <HelpCircle className="w-3.5 h-3.5 text-slate-400" /> 규칙 설명
              </button>
              <button 
                onClick={() => applyPreset('reset')}
                className="flex items-center gap-1.5 px-3.5 py-1.5 text-xs font-semibold text-slate-300 bg-slate-900 border border-slate-800 rounded-lg hover:bg-slate-800 transition"
              >
                <RotateCcw className="w-3.5 h-3.5 text-slate-400" /> 시뮬레이션 리셋
              </button>
            </div>
          </header>

          <main className="max-w-6xl mx-auto space-y-8">
            
            {/* 상단 2열 대시보드 */}
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              
              {/* 타임라인 연동 확률 변동 선 그래프 */}
              <div className="lg:col-span-2 bg-slate-900/60 border border-slate-800/80 rounded-2xl p-6 flex flex-col justify-between backdrop-blur-md relative overflow-hidden">
                <div className="absolute top-0 right-0 w-32 h-32 bg-red-600/5 blur-3xl rounded-full"></div>
                
                <div>
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-xs font-bold tracking-wider text-amber-500 uppercase flex items-center gap-1.5">
                      <TrendingUp className="w-4 h-4" /> Live Probability Trend
                    </span>
                    <span className="text-xs font-medium text-slate-400">
                      선택 시점 확률: <strong className="text-amber-400 text-sm font-mono">{currentProbability}%</strong>
                    </span>
                  </div>
                  <h3 className="text-base font-extrabold text-white mb-4">
                    시간대별 대한민국 32강 진출 시뮬레이션 곡선
                  </h3>

                  {/* 100% 커스텀 SVG 차트 */}
                  <div className="w-full bg-slate-950/60 rounded-xl p-2 border border-slate-850 relative">
                    <svg viewBox="0 0 500 180" className="w-full h-auto overflow-visible">
                      <defs>
                        {/* 그라데이션 영역 색상 지정 */}
                        <linearGradient id="area-gradient" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="0%" stopColor="#f59e0b" stopOpacity="0.25"/>
                          <stop offset="100%" stopColor="#f59e0b" stopOpacity="0.0"/>
                        </linearGradient>
                        <linearGradient id="line-gradient" x1="0" y1="0" x2="1" y2="0">
                          <stop offset="0%" stopColor="#ef4444" />
                          <stop offset="50%" stopColor="#f59e0b" />
                          <stop offset="100%" stopColor="#10b981" />
                        </linearGradient>
                      </defs>

                      {/* 가로 그리드 라인 */}
                      <line x1="40" y1="20" x2="465" y2="20" stroke="#1e293b" strokeDasharray="3" strokeWidth="0.5" />
                      <text x="35" y="24" fill="#64748b" fontSize="8" textAnchor="end" fontFamily="monospace">100%</text>

                      <line x1="40" y1="95" x2="465" y2="95" stroke="#1e293b" strokeDasharray="3" strokeWidth="0.5" />
                      <text x="35" y="99" fill="#64748b" fontSize="8" textAnchor="end" fontFamily="monospace">50%</text>

                      <line x1="40" y1="170" x2="465" y2="170" stroke="#1e293b" strokeDasharray="3" strokeWidth="0.5" />
                      <text x="35" y="174" fill="#64748b" fontSize="8" textAnchor="end" fontFamily="monospace">0%</text>

                      {/* 확률 면적 채우기 */}
                      <path d={chartPoints.areaPath} fill="url(#area-gradient)" />

                      {/* 메인 확률 선 */}
                      <path d={chartPoints.linePath} fill="none" stroke="url(#line-gradient)" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />

                      {/* 각 단계별 데이터 마커 포인트 */}
                      {chartPoints.points.map((pt, idx) => {
                        const isCurrentSelected = idx === selectedTimeIdx;
                        return (
                          <g key={idx}>
                            {isCurrentSelected && (
                              <circle cx={pt.x} cy={pt.y} r="8" fill="#f59e0b" fillOpacity="0.3" className="animate-ping" />
                            )}
                            <circle 
                              cx={pt.x} 
                              cy={pt.y} 
                              r={isCurrentSelected ? "5" : "3.5"} 
                              fill={isCurrentSelected ? "#f59e0b" : "#334155"} 
                              stroke="#020617" 
                              strokeWidth="1.5"
                              className="cursor-pointer transition-all hover:scale-125"
                              onClick={() => setSelectedTimeIdx(idx)}
                            />
                            {/* 확률 텍스트 라벨 */}
                            <text 
                              x={pt.x} 
                              y={pt.y - 10} 
                              fill={isCurrentSelected ? "#f59e0b" : "#94a3b8"} 
                              fontSize="9" 
                              fontWeight={isCurrentSelected ? "bold" : "normal"}
                              textAnchor="middle"
                              fontFamily="monospace"
                            >
                              {pt.val}%
                            </text>
                            {/* 시간축 라벨 */}
                            <text 
                              x={pt.x} 
                              y="180" 
                              fill={isCurrentSelected ? "#f59e0b" : "#475569"} 
                              fontSize="8" 
                              fontWeight={isCurrentSelected ? "bold" : "normal"}
                              textAnchor="middle"
                            >
                              {pt.time}
                            </text>
                          </g>
                        );
                      })}
                    </svg>
                  </div>
                </div>

                {/* 하단 인터랙티브 타임라인 트래커 슬라이더 */}
                <div className="space-y-4 pt-4 border-t border-slate-800/60 mt-4">
                  <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-2">
                    <span className="text-xs font-semibold text-slate-300 flex items-center gap-1.5">
                      <Clock className="w-4 h-4 text-amber-500" />
                      타임라인 시뮬레이션 타임 트래커
                    </span>
                    <span className="text-xs text-slate-400">
                      슬라이더를 넘기면 우측 순위표가 <strong className="text-amber-400">{timelineMilestones[selectedTimeIdx].time}</strong> 기준의 실시간 순위로 바뀝니다.
                    </span>
                  </div>

                  {/* 커스텀 슬라이더 컨트롤러 */}
                  <div className="space-y-2">
                    <input 
                      type="range" 
                      min="0" 
                      max="5" 
                      value={selectedTimeIdx}
                      onChange={(e) => setSelectedTimeIdx(parseInt(e.target.value))}
                      className="w-full accent-amber-500 bg-slate-950 h-2 rounded-lg cursor-pointer border border-slate-800"
                    />
                    <div className="grid grid-cols-6 gap-1 text-[10px] text-center font-bold">
                      {timelineMilestones.map((ms, idx) => (
                        <div 
                          key={idx}
                          onClick={() => setSelectedTimeIdx(idx)}
                          className={`cursor-pointer p-1 rounded transition-all ${
                            idx === selectedTimeIdx 
                              ? 'text-amber-400 bg-slate-800' 
                              : 'text-slate-500 hover:text-slate-300'
                          }`}
                        >
                          <div className="font-mono text-[11px]">{ms.time}</div>
                          <div className="hidden md:block truncate mt-0.5">{ms.label}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

              </div>

              {/* 한국의 현재 시점 판도 결과 카드 */}
              <div className="bg-slate-900/60 border border-slate-800/80 rounded-2xl p-6 flex flex-col justify-between backdrop-blur-md">
                <div>
                  <div className="flex items-center justify-between mb-4">
                    <span className="text-xs font-bold tracking-wider text-slate-500 uppercase">Live Probability</span>
                    <span className={`text-[11px] font-bold px-2 py-0.5 rounded-full ${koreaStatus.badge}`}>
                      {koreaStatus.label}
                    </span>
                  </div>

                  <div className="flex items-start gap-4 mb-5">
                    {koreaStatus.icon}
                    <div>
                      <h2 className="text-xl font-bold text-white mb-1">
                        최종 결과 예측 확률: <span className="text-amber-400 font-mono font-black">{probabilityTrend[5].val}%</span>
                      </h2>
                      <p className="text-slate-400 text-xs leading-relaxed">
                        {koreaStatus.desc}
                      </p>
                    </div>
                  </div>
                </div>

                {/* 간편 필터 프리셋 버튼 */}
                <div className="space-y-3 pt-4 border-t border-slate-800/60 text-xs text-slate-400">
                  <span className="font-bold block text-slate-300">신속 시뮬레이션 대입:</span>
                  <div className="grid grid-cols-2 gap-2">
                    <button 
                      onClick={() => applyPreset('best')}
                      className="py-1.5 font-bold rounded bg-emerald-950/40 hover:bg-emerald-900/40 border border-emerald-800/40 text-emerald-400 text-center transition"
                    >
                      최상 (전부 성공)
                    </button>
                    <button 
                      onClick={() => applyPreset('cutoff')}
                      className="py-1.5 font-bold rounded bg-slate-850 hover:bg-slate-750 text-slate-200 text-center transition"
                    >
                      턱걸이 (3개 성공)
                    </button>
                    <button 
                      onClick={() => applyPreset('worst')}
                      className="py-1.5 font-bold rounded bg-red-950/40 hover:bg-red-900/40 border border-red-800/40 text-red-400 text-center transition"
                    >
                      최악 (전부 실패)
                    </button>
                    <button 
                      onClick={() => applyPreset('reset')}
                      className="py-1.5 font-bold rounded bg-slate-900 hover:bg-slate-850 text-slate-400 text-center transition"
                    >
                      초기 상태
                    </button>
                  </div>
                </div>
              </div>
            </div>

            {/* 메인 콘텐츠: 경우의 수 카드 리스트 & 실시간 순위표 */}
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
              
              {/* 좌측 2개 열: 남은 경우의 수 컨트롤러 */}
              <div className="lg:col-span-2 space-y-4">
                <h3 className="text-base font-bold text-slate-300 flex items-center gap-2">
                  <TrendingUp className="w-4 h-4 text-red-500" />
                  미래 시나리오 실시간 조정 (각 경기 예상 결과 선택)
                </h3>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {scenarios.map((scenario) => {
                    const isPassedSelectedTime = scenario.timeSlot <= selectedTimeIdx;
                    
                    return (
                      <div 
                        key={scenario.id} 
                        className={`bg-slate-900/40 border rounded-xl p-4.5 flex flex-col justify-between transition-all duration-200 hover:scale-[1.01] ${
                          !isPassedSelectedTime ? 'opacity-40 grayscale-[30%] border-slate-900 bg-slate-950/40' :
                          scenario.selected !== 'pending' && scenario.options[scenario.selected].effect === 'success' ? 'border-emerald-500/30 shadow-[0_0_12px_rgba(16,185,129,0.04)] bg-emerald-950/5' : 
                          scenario.selected !== 'pending' && scenario.options[scenario.selected].effect === 'fail' ? 'border-red-500/30 bg-red-950/5' : 'border-slate-800'
                        }`}
                      >
                        <div>
                          <div className="flex items-center justify-between mb-3">
                            <span className="text-[10px] font-black px-2 py-0.5 bg-slate-800 rounded-full text-slate-300 uppercase tracking-wider font-mono">
                              Group {scenario.group} • {timelineMilestones[scenario.timeSlot].time}
                            </span>
                            
                            {!isPassedSelectedTime ? (
                              <span className="text-[10px] text-slate-500 font-bold bg-slate-950 px-2 py-0.5 rounded-full border border-slate-900">
                                타임라인 제한됨
                              </span>
                            ) : scenario.selected === 'pending' ? (
                              <span className="text-[10px] text-slate-400 font-bold flex items-center gap-1 bg-slate-950 px-2 py-0.5 rounded-full border border-slate-850">
                                <span className="w-1.5 h-1.5 rounded-full bg-slate-500 animate-pulse"></span> 경기전 대기
                              </span>
                            ) : (
                              <span className={`text-[10px] font-bold flex items-center gap-1 px-2 py-0.5 rounded-full border ${
                                scenario.options[scenario.selected].effect === 'success'
                                  ? 'text-emerald-400 bg-emerald-950 border-emerald-500/20'
                                  : 'text-red-400 bg-red-950 border-red-500/20'
                              }`}>
                                {scenario.options[scenario.selected].effect === 'success' ? <CheckCircle className="w-3 h-3" /> : <XCircle className="w-3 h-3" />}
                                {scenario.options[scenario.selected].label.split(' ')[0]} 선택됨
                              </span>
                            )}
                          </div>

                          <h4 className="text-sm font-bold text-white mb-2">{scenario.title}</h4>
                          <p className="text-slate-400 text-xs leading-relaxed mb-4">
                            {scenario.detail}
                          </p>
                        </div>

                        <div className="space-y-2 mt-2">
                          {scenario.options.map((opt, idx) => {
                            const isSelected = scenario.selected === idx;
                            return (
                              <button
                                key={idx}
                                disabled={!isPassedSelectedTime}
                                onClick={() => handleOptionSelect(scenario.id, idx)}
                                className={`w-full text-left p-3 rounded-xl border transition-all text-xs flex justify-between items-center ${
                                  !isPassedSelectedTime ? 'bg-slate-950/20 border-slate-900 text-slate-600 cursor-not-allowed' :
                                  isSelected
                                    ? opt.effect === 'success'
                                      ? 'bg-emerald-950/40 border-emerald-500/60 text-emerald-300'
                                      : 'bg-red-950/40 border-red-500/60 text-red-300'
                                    : 'bg-slate-950/60 border-slate-850 hover:border-slate-700 text-slate-300'
                                }`}
                              >
                                <div>
                                  <span className="font-bold block">{opt.label}</span>
                                  <span className={`text-[10px] block mt-0.5 ${isSelected ? 'text-slate-200' : 'text-slate-500'}`}>
                                    {opt.desc}
                                  </span>
                                </div>
                                {isPassedSelectedTime && isSelected && (
                                  <span className={`text-[10px] font-bold px-2 py-0.5 rounded ${
                                    opt.effect === 'success' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'
                                  }`}>
                                    {opt.effect === 'success' ? '한국 유리' : '한국 불리'}
                                  </span>
                                )}
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>

                <div className="bg-slate-900/20 border border-slate-850 rounded-xl p-4 flex gap-3 text-xs text-slate-400">
                  <Info className="w-4 h-4 text-slate-400 shrink-0 mt-0.5" />
                  <div>
                    <p className="font-semibold text-slate-300 mb-1">인터랙티브 가이드라인</p>
                    <p className="leading-relaxed">
                      상단의 <strong>시간축 슬라이더</strong>를 움직여 원하는 시간대를 먼저 고르고, 해당 시간대 및 이전 시간대의 경기 카드를 조작해 보세요. 미래 시간대의 경기는 자동으로 비활성화 처리되어 시간대별 정확한 가상 시뮬레이션이 성립됩니다.
                    </p>
                  </div>
                </div>
              </div>

              {/* 우측 1개 열: 12개 조 3위 실시간 테이블 */}
              <div className="space-y-4">
                <h3 className="text-base font-bold text-slate-300 flex items-center gap-2">
                  <Award className="w-4 h-4 text-yellow-500" />
                  <span>실시간 3위 테이블 ({timelineMilestones[selectedTimeIdx].time} 기준)</span>
                </h3>

                <div className="bg-slate-900/60 border border-slate-800 rounded-2xl overflow-hidden backdrop-blur-md shadow-xl">
                  <div className="p-3 bg-slate-950 border-b border-slate-850 text-[10px] text-slate-400 flex items-center justify-between font-bold">
                    <span>RANK & NATION</span>
                    <div className="flex gap-4">
                      <span className="w-8 text-center">승점</span>
                      <span className="w-8 text-center">득실</span>
                      <span className="w-6 text-center">결과</span>
                    </div>
                  </div>

                  <div className="divide-y divide-slate-850">
                    {standings.map((team, index) => {
                      const rank = index + 1;
                      const isKorea = team.id === 'KOR';
                      const isPassZone = rank <= 8;

                      return (
                        <div 
                          key={team.id} 
                          className={`p-3 flex items-center justify-between transition-all duration-300 ${
                            isKorea 
                              ? 'bg-slate-800/80 border-y-2 border-amber-500/60 shadow-lg relative z-10' 
                              : isPassZone 
                                ? 'hover:bg-slate-900/40' 
                                : 'bg-red-950/5 hover:bg-red-950/10'
                          }`}
                        >
                          <div className="flex items-center gap-2.5">
                            <span className={`w-5 text-center font-mono text-xs font-bold ${
                              isKorea ? 'text-amber-400' : isPassZone ? 'text-slate-400' : 'text-slate-600'
                            }`}>
                              {rank}
                            </span>
                            
                            <div>
                              <div className="flex items-center gap-1.5">
                                <span className={`text-xs font-bold ${isKorea ? 'text-amber-400 font-extrabold' : 'text-slate-200'}`}>
                                  {team.name}
                                </span>
                                <span className="text-[9px] font-black font-mono text-slate-500 px-1 py-0.2 bg-slate-950 border border-slate-850 rounded">
                                  {team.group}조
                                </span>
                              </div>
                              <span className="text-[9px] text-slate-500 font-medium block">
                                {team.desc}
                              </span>
                            </div>
                          </div>

                          <div className="flex gap-4 text-xs font-semibold items-center font-mono">
                            <span className={`w-8 text-center ${isKorea ? 'text-amber-400 font-black' : 'text-slate-300'}`}>
                              {team.pts}
                            </span>
                            <span className={`w-8 text-center ${
                              team.gd > 0 ? 'text-emerald-400' : team.gd < 0 ? 'text-red-400' : 'text-slate-400'
                            }`}>
                              {team.gd > 0 ? `+${team.gd}` : team.gd}
                            </span>
                            
                            <span className="w-6 flex justify-center">
                              {isPassZone ? (
                                <span className="w-4 h-4 rounded-full bg-emerald-950 border border-emerald-500/30 text-[9px] font-black text-emerald-400 flex items-center justify-center">
                                  P
                                </span>
                              ) : (
                                <span className="w-4 h-4 rounded-full bg-red-950 border border-red-500/30 text-[9px] font-black text-red-400 flex items-center justify-center">
                                  F
                                </span>
                              )}
                            </span>
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  <div className="p-3 bg-slate-950 border-t border-slate-850 flex items-center justify-between text-[11px] text-slate-400">
                    <span className="flex items-center gap-1">
                      <span className="w-2.5 h-2.5 rounded bg-emerald-500/20 border border-emerald-500/30"></span> 1~8위 와일드카드 진출
                    </span>
                    <span className="flex items-center gap-1">
                      <span className="w-2.5 h-2.5 rounded bg-red-500/10 border border-red-500/30"></span> 9~12위 진출 탈락
                    </span>
                  </div>
                </div>
              </div>
            </div>
          </main>

          {showHelpModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm p-4">
              <div className="bg-slate-900 border border-slate-800 rounded-2xl max-w-md w-full p-6 shadow-2xl relative">
                <h4 className="text-base font-bold text-white mb-3 flex items-center gap-2">
                  <HelpCircle className="w-5 h-5 text-amber-500" />
                  경우의 수 및 와일드카드 규정 안내
                </h4>
                
                <div className="space-y-3.5 text-xs text-slate-300 leading-relaxed">
                  <p>
                    이번 2026 월드컵은 참가국이 48개국으로 대폭 확대되면서, 기존과 완전히 다른 새로운 조별리그 룰이 적용됩니다.
                  </p>
                  
                  <div className="bg-slate-950 p-3 rounded-lg border border-slate-850 space-y-1.5 font-medium text-slate-400">
                    <p className="text-amber-500 font-bold mb-1">핵심 요약 규칙</p>
                    <p>1. 각 조 1위 및 2위(총 24개팀)는 무조건 진출</p>
                    <p>2. 조 3위 12개 국가 중 성적 상위 8개 팀만 32강 합류</p>
                    <p>3. 조 3위 성적 비교: 승점 → 골득실 → 다득점 순</p>
                  </div>

                  <p>
                    대한민국은 최종 성적 <strong>승점 3점, 골득실 -1</strong>로 조 3위가 이미 확정되었습니다. 앞서 타 조의 경기 결과들로 인해 다른 조 3위인 보스니아, 에콰도르, 스웨덴, 파라과이는 전부 한국을 넘어섰습니다.
                  </p>
                  <p>
                    따라서 한국이 살아남기 위해선 아직 경기가 다 끝나지 않은 <strong>G, H, I, J, K, L조 중 최소 3개조 이상의 3위 성적이 한국(3점, -1) 이하가 되어야만 합니다.</strong>
                  </p>
                </div>

                <button 
                  onClick={() => setShowHelpModal(false)}
                  className="mt-6 w-full py-2 bg-slate-800 hover:bg-slate-750 font-bold text-xs text-white rounded-lg transition"
                >
                  확인했습니다
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
